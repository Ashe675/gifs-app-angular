<div class="grid grid-cols-2 md:grid-cols-4 gap-4 py-5 overflow-y-auto h-screen" (scroll)="onScroll($event)" #groupDiv>
    @for (group of gifsService.trendingGifGroup(); track $index) {
    <div class="grid gap-4">
        @for(gif of group; track gif.id){
        <div>
            <img class="h-auto max-w-full rounded" [src]="gif.url" [alt]="gif.title">
        </div>
        }
    </div>
    }

</div>
