<h2 class="text-2xl font-bold mt-5 text-slate-900">Search Gifs</h2>
<h3 class="text-sm text-gray-500">Search gifs by name, description or tags</h3>
<section class=" flex flex-col gap-4">
    <input type="search" placeholder="Search Gifs" class="mt-3 border border-gray-100 rounded-md px-2 py-1.5 bg-white"
        (keyup.enter)="onSearch(txtSearch.value)" #txtSearch>
</section>
<section class="py-5">
    @if (searchedGifsLoading()) {
    <app-loader size="md" variant="local" />
    } @else {
    <gif-list [gifs]="gifs()" />
    }
</section>
